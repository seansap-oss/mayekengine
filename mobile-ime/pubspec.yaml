name: mayekengine_ime
description: Mobile keyboard IME module for the MayekEngine repository.
publish_to: "none"
version: 0.1.0
environment:
  sdk: ">=3.0.0 <5.0.0"
dependencies:
  flutter:
    sdk: flutter
flutter:
  plugin:
    platforms:
      android:
        package: com.mayekengine.ime
        pluginClass: MayekEngineImePlugin
  assets:
    - assets/dict.json
